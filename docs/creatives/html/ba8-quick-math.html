<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 50% 45%, rgba(213,235,75,0.1) 0%, transparent 50%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.05) 1px, transparent 1px); background-size: 44px 44px;"></div>

  <!-- Decorative math symbols -->
  <div style="position: absolute; top: 100px; right: 100px; font-family: 'JetBrains Mono', monospace; font-size: 140px; color: rgba(213,235,75,0.03); font-weight: 700;">+</div>
  <div style="position: absolute; bottom: 180px; left: 60px; font-family: 'JetBrains Mono', monospace; font-size: 100px; color: rgba(213,235,75,0.03); font-weight: 700;">=</div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Pre-headline -->
  <div style="position: absolute; top: 150px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 16px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 3px;">The Math is Simple</div>
  </div>

  <!-- Calculator UI -->
  <div style="position: absolute; top: 210px; left: 100px; right: 100px; z-index: 10;">
    <!-- Calculator body -->
    <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">

      <!-- Equation display -->
      <div style="display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 40px;">
        <!-- Term 1: 2 min -->
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 32px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 48px; color: #fff; line-height: 1;">2 min</div>
          <div style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.4); margin-top: 8px;">quiz</div>
        </div>

        <!-- Plus sign with glow -->
        <div style="width: 56px; height: 56px; background: rgba(213,235,75,0.08); border: 1px solid rgba(213,235,75,0.2); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(213,235,75,0.1);">
          <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #D5EB4B;">+</span>
        </div>

        <!-- Term 2: 48 hrs -->
        <div style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 32px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 48px; color: #fff; line-height: 1;">48 hrs</div>
          <div style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.4); margin-top: 8px;">audit</div>
        </div>
      </div>

      <!-- Equals line with glow -->
      <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 36px;">
        <div style="flex: 1; height: 2px; background: linear-gradient(90deg, transparent, rgba(213,235,75,0.2), transparent);"></div>
        <div style="width: 56px; height: 56px; background: rgba(213,235,75,0.1); border: 2px solid rgba(213,235,75,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px rgba(213,235,75,0.15);">
          <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #D5EB4B;">=</span>
        </div>
        <div style="flex: 1; height: 2px; background: linear-gradient(90deg, transparent, rgba(213,235,75,0.2), transparent);"></div>
      </div>

      <!-- Result -->
      <div style="text-align: center; background: rgba(213,235,75,0.08); border: 2px solid rgba(213,235,75,0.2); border-radius: 20px; padding: 36px; box-shadow: 0 0 40px rgba(213,235,75,0.08);">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 88px; color: #D5EB4B; line-height: 1; text-shadow: 0 0 40px rgba(213,235,75,0.2);">₹40L</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 22px; color: rgba(255,255,255,0.5); margin-top: 12px;">saved per year</div>
      </div>
    </div>
  </div>

  <!-- Bottom text -->
  <div style="position: absolute; bottom: 120px; left: 100px; right: 100px; text-align: center; z-index: 10;">
    <p style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 26px; color: #fff; line-height: 1.3;">
      The math is simple.<br>The <span style="color: #D5EB4B;">decision</span> should be too.
    </p>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 45px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.25);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Do the Math &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
