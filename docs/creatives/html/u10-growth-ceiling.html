<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 50% 60%, rgba(213,235,75,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(229,62,62,0.06) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Grid lines -->
  <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 80px 80px;"></div>

  <!-- Decorative shapes -->
  <div style="position: absolute; top: -80px; left: -40px; width: 250px; height: 250px; border: 1.5px solid rgba(213,235,75,0.05); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 350px; right: -60px; width: 180px; height: 180px; border: 1.5px solid rgba(255,255,255,0.03); transform: rotate(45deg);"></div>

  <!-- Lime accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #FFFFFF;">
      Your revenue <span style="color: #D5EB4B;">flatlined.</span><br>Your headcount <span style="color: #E53E3E;">didn't.</span>
    </h1>
  </div>

  <!-- Bar chart visualization -->
  <div style="position: absolute; top: 350px; left: 80px; right: 80px; bottom: 220px; z-index: 5;">
    <!-- Ceiling line (red) -->
    <div style="position: absolute; top: 40px; left: 0; right: 0; height: 2px; background: #E53E3E; z-index: 3;">
      <div style="position: absolute; right: 0; top: -12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #E53E3E;">REVENUE CEILING</div>
    </div>
    <!-- Dashed ceiling line -->
    <div style="position: absolute; top: 40px; left: 0; right: 0; height: 2px; background: repeating-linear-gradient(90deg, #E53E3E 0px, #E53E3E 8px, transparent 8px, transparent 16px); z-index: 2;"></div>

    <!-- Chart bars container -->
    <div style="position: absolute; bottom: 40px; left: 0; right: 0; height: 380px; display: flex; align-items: flex-end; justify-content: space-around; padding: 0 20px;">
      <!-- Revenue bars (lime, hitting ceiling) -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 180px; background: linear-gradient(180deg, rgba(213,235,75,0.8), rgba(213,235,75,0.4)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">2022</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 250px; background: linear-gradient(180deg, rgba(213,235,75,0.8), rgba(213,235,75,0.4)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">2023</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 300px; background: linear-gradient(180deg, rgba(213,235,75,0.8), rgba(213,235,75,0.4)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">2024</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 300px; background: linear-gradient(180deg, rgba(213,235,75,0.6), rgba(213,235,75,0.3)); border-radius: 6px 6px 0 0; border-top: 3px solid #E53E3E;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">2025</span>
      </div>

      <!-- Spacer -->
      <div style="width: 2px; height: 380px; background: rgba(255,255,255,0.05);"></div>

      <!-- Headcount bars (white/grey, growing) -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 120px; background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">8</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 180px; background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">12</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 260px; background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">18</span>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <div style="width: 60px; height: 340px; background: linear-gradient(180deg, rgba(229,62,62,0.4), rgba(229,62,62,0.15)); border-radius: 6px 6px 0 0;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.4);">24</span>
      </div>
    </div>

    <!-- Legend -->
    <div style="position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 40px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 14px; height: 14px; background: #D5EB4B; border-radius: 3px; opacity: 0.7;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.5);">Revenue</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <div style="width: 14px; height: 14px; background: rgba(255,255,255,0.25); border-radius: 3px;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.5);">Headcount</span>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; display: flex; align-items: center; gap: 24px; z-index: 10;">
    <div style="background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px;">Break Through the Ceiling →</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">Free AI Operations Audit</div>
  </div>

</div>
</body>
</html>
