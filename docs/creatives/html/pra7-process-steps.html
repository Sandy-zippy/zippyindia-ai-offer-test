<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 50% 50%, rgba(213,235,75,0.1) 0%, transparent 60%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Flowing gradient stripes -->
  <div style="position: absolute; top: -100px; left: -200px; width: 1500px; height: 200px; background: linear-gradient(90deg, transparent, rgba(213,235,75,0.03), transparent); transform: rotate(-5deg);"></div>
  <div style="position: absolute; top: 400px; left: -200px; width: 1500px; height: 150px; background: linear-gradient(90deg, transparent, rgba(213,235,75,0.02), transparent); transform: rotate(-5deg);"></div>

  <!-- Dot pattern -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.05) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <!-- Geometric accents -->
  <div style="position: absolute; top: -60px; left: -60px; width: 200px; height: 200px; border: 1.5px solid rgba(213,235,75,0.06); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: -40px; right: -40px; width: 150px; height: 150px; border: 1.5px solid rgba(213,235,75,0.04); transform: rotate(45deg);"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; text-align: center; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; line-height: 1.15; color: #FFFFFF;">
      Three steps to<br><span style="color: #D5EB4B;">₹40L+ in savings.</span>
    </h1>
  </div>

  <!-- Three connected cards -->
  <div style="position: absolute; top: 370px; left: 60px; right: 60px; display: flex; align-items: center; gap: 0; z-index: 5;">
    <!-- Card 1 -->
    <div style="flex: 1; background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 30px; text-align: center; position: relative;">
      <div style="width: 60px; height: 60px; background: #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(213,235,75,0.3);">
        <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px; color: #1A1A2E;">1</span>
      </div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #D5EB4B; margin-bottom: 12px;">Quiz</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.5;">Answer 10 questions about your operations. Takes 2 minutes.</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(213,235,75,0.5); margin-top: 16px; text-transform: uppercase; letter-spacing: 2px;">2 min</div>
    </div>

    <!-- Connector arrow -->
    <div style="width: 60px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <div style="width: 40px; height: 2px; background: repeating-linear-gradient(90deg, #D5EB4B 0px, #D5EB4B 6px, transparent 6px, transparent 10px); opacity: 0.5;"></div>
      <div style="width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid rgba(213,235,75,0.5); margin-left: -2px;"></div>
    </div>

    <!-- Card 2 -->
    <div style="flex: 1; background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px 30px; text-align: center; position: relative;">
      <div style="width: 60px; height: 60px; background: #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(213,235,75,0.3);">
        <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px; color: #1A1A2E;">2</span>
      </div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #D5EB4B; margin-bottom: 12px;">Audit</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.5;">We analyze your ops with AI and find every inefficiency.</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(213,235,75,0.5); margin-top: 16px; text-transform: uppercase; letter-spacing: 2px;">48 hrs</div>
    </div>

    <!-- Connector arrow -->
    <div style="width: 60px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
      <div style="width: 40px; height: 2px; background: repeating-linear-gradient(90deg, #D5EB4B 0px, #D5EB4B 6px, transparent 6px, transparent 10px); opacity: 0.5;"></div>
      <div style="width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid rgba(213,235,75,0.5); margin-left: -2px;"></div>
    </div>

    <!-- Card 3 -->
    <div style="flex: 1; background: rgba(213,235,75,0.08); backdrop-filter: blur(12px); border: 2px solid rgba(213,235,75,0.2); border-radius: 20px; padding: 40px 30px; text-align: center; position: relative; box-shadow: 0 0 30px rgba(213,235,75,0.1);">
      <div style="width: 60px; height: 60px; background: #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(213,235,75,0.4);">
        <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 24px; color: #1A1A2E;">3</span>
      </div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #D5EB4B; margin-bottom: 12px;">Automate</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.5;">We build and deploy automations. You start saving.</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(213,235,75,0.5); margin-top: 16px; text-transform: uppercase; letter-spacing: 2px;">Week 2</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 0 25px rgba(213,235,75,0.3);">Start Step 1 →</div>
  </div>

</div>
</body>
</html>
