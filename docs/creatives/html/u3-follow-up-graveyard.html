<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: #2A2A35; position: relative; overflow: hidden;">

  <!-- Geometric accents -->
  <div style="position: absolute; top: 300px; right: -30px; width: 180px; height: 180px; border: 2px solid rgba(213,235,75,0.06); transform: rotate(15deg);"></div>
  <div style="position: absolute; bottom: 400px; left: -50px; width: 240px; height: 240px; border: 2px solid rgba(213,235,75,0.04); border-radius: 50%;"></div>
  <div style="position: absolute; top: 250px; left: 900px; width: 5px; height: 5px; background: #D5EB4B; border-radius: 50%; opacity: 0.5;"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 60px;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 50px; line-height: 1.15; color: #FFFFFF; letter-spacing: -1px;">
      60% of your leads<br>died today.<br><span style="color: rgba(255,255,255,0.4);">Nobody noticed.</span>
    </h1>
  </div>

  <!-- Stat -->
  <div style="position: absolute; top: 450px; left: 60px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 140px; color: #D5EB4B; line-height: 1; opacity: 0.9;">60%</div>
    <div style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 18px; color: rgba(255,255,255,0.4); margin-top: 8px; letter-spacing: 2px; text-transform: uppercase;">leads lost daily</div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; top: 650px; left: 60px; right: 60px;">
    <p style="font-family: 'Inter', sans-serif; font-weight: 400; font-size: 26px; line-height: 1.5; color: rgba(255,255,255,0.75);">
      If nobody calls back in 5 minutes, 6 out of 10 leads go to your competitor. AI responds in seconds.
    </p>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 260px; left: 60px;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px;">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Stop Losing Leads</span>
    </div>
  </div>

</div>
</body>
</html>
