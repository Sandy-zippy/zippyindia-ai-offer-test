<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 20% 30%, rgba(213,235,75,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(213,235,75,0.08) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Grid pattern overlay -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.08) 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Geometric shapes -->
  <div style="position: absolute; top: -100px; right: -50px; width: 400px; height: 400px; border: 2px solid rgba(213,235,75,0.06); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 300px; left: -80px; width: 200px; height: 200px; border: 2px solid rgba(213,235,75,0.08); transform: rotate(45deg);"></div>
  <div style="position: absolute; top: 200px; right: 80px; width: 8px; height: 8px; background: #D5EB4B; border-radius: 50%; opacity: 0.3;"></div>
  <div style="position: absolute; top: 350px; right: 150px; width: 5px; height: 5px; background: #D5EB4B; border-radius: 50%; opacity: 0.2;"></div>

  <!-- Lime accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px;">
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 16px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px;">Salary Breakdown Report</div>
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #FFFFFF;">
      The department<br>you didn't know<br>you're <span style="color: #D5EB4B;">paying for.</span>
    </h1>
  </div>

  <!-- Fake Pie Chart -->
  <div style="position: absolute; top: 440px; left: 60px; width: 280px; height: 280px;">
    <div style="width: 280px; height: 280px; border-radius: 50%; background: conic-gradient(#D5EB4B 0deg 126deg, rgba(213,235,75,0.3) 126deg 216deg, rgba(255,255,255,0.1) 216deg 360deg); position: relative;">
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 140px; height: 140px; border-radius: 50%; background: #2A2A35; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #D5EB4B;">35%</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.5);">MANUAL OPS</div>
      </div>
    </div>
  </div>

  <!-- Chart labels -->
  <div style="position: absolute; top: 460px; left: 380px; right: 60px;">
    <div style="margin-bottom: 24px;">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 6px;">
        <div style="width: 12px; height: 12px; background: #D5EB4B; border-radius: 2px;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: #fff;">Manual Operations</span>
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #D5EB4B; margin-left: 24px;">₹40L/yr</div>
    </div>
    <div style="margin-bottom: 24px;">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 6px;">
        <div style="width: 12px; height: 12px; background: rgba(213,235,75,0.3); border-radius: 2px;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.6);">Repetitive Tasks</span>
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: rgba(255,255,255,0.5); margin-left: 24px;">₹25L/yr</div>
    </div>
    <div>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 6px;">
        <div style="width: 12px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 2px;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.4);">Actual Growth Work</span>
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: rgba(255,255,255,0.4); margin-left: 24px;">₹50L/yr</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 100px; left: 60px; right: 60px; display: flex; align-items: center; gap: 24px;">
    <div style="background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px;">Find Your Hidden Costs →</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">Free AI Operations Audit</div>
  </div>

</div>
</body>
</html>
