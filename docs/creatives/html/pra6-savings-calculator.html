<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: linear-gradient(160deg, #FFFDF7 0%, #F5F0E8 40%, #FFFDF7 100%); position: relative; overflow: hidden;">

  <!-- Gradient mesh spots -->
  <div style="position: absolute; top: 100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(213,235,75,0.08) 0%, transparent 70%);"></div>
  <div style="position: absolute; bottom: -50px; left: -50px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(213,235,75,0.06) 0%, transparent 70%);"></div>

  <!-- Subtle dots -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(42,42,53,0.04) 1px, transparent 1px); background-size: 32px 32px;"></div>

  <!-- Decorative lines -->
  <div style="position: absolute; top: -200px; left: 300px; width: 1px; height: 500px; background: rgba(213,235,75,0.1);"></div>
  <div style="position: absolute; top: -200px; left: 700px; width: 1px; height: 400px; background: rgba(213,235,75,0.06);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #2A2A35;">
      Enter your team size.<br><span style="color: #B8CF2E;">See your savings.</span>
    </h1>
  </div>

  <!-- Calculator UI Mockup -->
  <div style="position: absolute; top: 360px; left: 80px; right: 80px; z-index: 5;">
    <div style="background: white; border-radius: 24px; box-shadow: 0 12px 50px rgba(0,0,0,0.08); border: 1px solid rgba(42,42,53,0.06); overflow: hidden;">
      <!-- Calculator header -->
      <div style="background: #2A2A35; padding: 20px 30px; display: flex; align-items: center; gap: 10px;">
        <div style="width: 12px; height: 12px; background: #E53E3E; border-radius: 50%;"></div>
        <div style="width: 12px; height: 12px; background: #E5C03E; border-radius: 50%;"></div>
        <div style="width: 12px; height: 12px; background: #4ADE80; border-radius: 50%;"></div>
        <span style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); margin-left: 12px;">ZippyScale Savings Calculator</span>
      </div>

      <div style="padding: 36px; display: flex; gap: 40px;">
        <!-- Left: Inputs -->
        <div style="flex: 1;">
          <div style="margin-bottom: 24px;">
            <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-bottom: 8px;">Team Size</div>
            <div style="background: #F5F0E8; border: 2px solid rgba(42,42,53,0.08); border-radius: 10px; padding: 14px 18px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #2A2A35;">12</div>
          </div>
          <div style="margin-bottom: 24px;">
            <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-bottom: 8px;">Avg Salary (LPA)</div>
            <div style="background: #F5F0E8; border: 2px solid rgba(42,42,53,0.08); border-radius: 10px; padding: 14px 18px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #2A2A35;">₹8L</div>
          </div>
          <div>
            <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-bottom: 8px;">Manual Work %</div>
            <div style="background: #F5F0E8; border: 2px solid rgba(42,42,53,0.08); border-radius: 10px; padding: 14px 18px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #E53E3E;">45%</div>
          </div>
        </div>

        <!-- Right: Result -->
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(213,235,75,0.08); border-radius: 20px; padding: 30px; border: 2px solid rgba(213,235,75,0.2);">
          <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(42,42,53,0.5); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;">Your Annual Savings</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 64px; color: #B8CF2E; line-height: 1;">₹43L</div>
          <div style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(42,42,53,0.5); margin-top: 12px;">per year with AI automation</div>
          <div style="width: 100%; height: 8px; background: rgba(213,235,75,0.15); border-radius: 4px; margin-top: 20px;">
            <div style="width: 75%; height: 100%; background: linear-gradient(90deg, #D5EB4B, #B8CF2E); border-radius: 4px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 4px 15px rgba(213,235,75,0.3);">Calculate Your Savings →</div>
  </div>

</div>
</body>
</html>
