<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position:absolute;top:170px;left:70px;height:32px;z-index:10;">

  <!-- Headline -->
  <div style="position:absolute;top:230px;left:70px;right:70px;z-index:10;">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;color:#FFFFFF;line-height:1.2;">
      Your ₹5Cr business is leaving<br><span style="color:#D5EB4B;">₹40L on the table</span>
    </h1>
  </div>

  <!-- Calculator display -->
  <div style="position:absolute;top:390px;left:70px;right:70px;z-index:10;">
    <div style="background:#1a1a22;border:2px solid #33333F;border-radius:16px;padding:40px 36px;position:relative;">
      <!-- Calculator header -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
        <div style="width:12px;height:12px;border-radius:50%;background:#DC3545;"></div>
        <div style="width:12px;height:12px;border-radius:50%;background:#FFC107;"></div>
        <div style="width:12px;height:12px;border-radius:50%;background:#28A745;"></div>
        <span style="font-size:14px;color:rgba(255,255,255,0.3);margin-left:12px;">roi-calculator.zippyscale</span>
      </div>

      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:rgba(255,255,255,0.6);line-height:2.2;">
        <span style="color:#D5EB4B;">5</span> employees<br>
        <span style="color:rgba(255,255,255,0.3);">×</span> <span style="color:#D5EB4B;">₹15L</span> avg salary<br>
        <span style="color:rgba(255,255,255,0.3);">×</span> <span style="color:#D5EB4B;">50%</span> manual work
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:2px solid #33333F;">
        <span style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:36px;color:#D5EB4B;">= ₹37.5L/yr wasted</span>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div style="position:absolute;top:700px;left:70px;right:70px;z-index:10;">
    <p style="font-size:22px;color:rgba(255,255,255,0.7);line-height:1.5;">
      Our audit finds exactly where. In 48 hours. <span style="color:#D5EB4B;font-weight:500;">For free.</span>
    </p>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:790px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">Calculate Your Savings →</span>
    </div>
  </div>

</div>
</body>
</html>
