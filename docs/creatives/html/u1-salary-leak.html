<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 15% 25%, rgba(213,235,75,0.12) 0%, transparent 45%), radial-gradient(circle at 85% 75%, rgba(213,235,75,0.06) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Grid pattern -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.06) 1px, transparent 1px); background-size: 44px 44px;"></div>

  <!-- Geometric shapes -->
  <div style="position: absolute; top: -80px; right: -60px; width: 320px; height: 320px; border: 2px solid rgba(213,235,75,0.06); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 100px; left: -40px; width: 160px; height: 160px; border: 2px solid rgba(213,235,75,0.05); transform: rotate(45deg);"></div>

  <!-- Lime accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Pre-headline -->
  <div style="position: absolute; top: 145px; left: 60px; z-index: 10;">
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 3px;">Salary Breakdown</div>
  </div>

  <!-- Main headline -->
  <div style="position: absolute; top: 175px; left: 60px; right: 60px; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 50px; line-height: 1.15; color: #FFFFFF; letter-spacing: -1px;">
      Your ₹15L/month<br>salary bill has a<br><span style="color: #D5EB4B;">₹5L leak.</span>
    </h1>
  </div>

  <!-- Horizontal Bar Chart -->
  <div style="position: absolute; top: 415px; left: 60px; right: 60px; z-index: 10;">
    <!-- Bar 1: Manual Ops -->
    <div style="margin-bottom: 18px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6);">Manual Operations</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: #D5EB4B;">₹5.2L/mo</span>
      </div>
      <div style="width: 100%; height: 32px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden;">
        <div style="width: 65%; height: 100%; background: linear-gradient(90deg, #D5EB4B, #B8CF2E); border-radius: 6px; box-shadow: 0 0 20px rgba(213,235,75,0.3);"></div>
      </div>
    </div>
    <!-- Bar 2: Data Entry -->
    <div style="margin-bottom: 18px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6);">Data Entry & Copy-Paste</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: rgba(213,235,75,0.7);">₹3.8L/mo</span>
      </div>
      <div style="width: 100%; height: 32px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden;">
        <div style="width: 48%; height: 100%; background: linear-gradient(90deg, rgba(213,235,75,0.5), rgba(184,207,46,0.5)); border-radius: 6px;"></div>
      </div>
    </div>
    <!-- Bar 3: Follow-ups -->
    <div style="margin-bottom: 18px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.6);">Manual Follow-ups</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: rgba(213,235,75,0.5);">₹2.1L/mo</span>
      </div>
      <div style="width: 100%; height: 32px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden;">
        <div style="width: 26%; height: 100%; background: linear-gradient(90deg, rgba(213,235,75,0.3), rgba(184,207,46,0.3)); border-radius: 6px;"></div>
      </div>
    </div>
    <!-- Bar 4: Actual Growth (small) -->
    <div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
        <span style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.35);">Actual Growth Work</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: rgba(255,255,255,0.35);">₹3.9L/mo</span>
      </div>
      <div style="width: 100%; height: 32px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden;">
        <div style="width: 49%; height: 100%; background: rgba(255,255,255,0.08); border-radius: 6px;"></div>
      </div>
    </div>
  </div>

  <!-- Callout Card -->
  <div style="position: absolute; top: 780px; right: 60px; left: 60px; z-index: 10;">
    <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); border: 1px solid rgba(213,235,75,0.15); border-radius: 16px; padding: 20px 28px; display: flex; align-items: center; gap: 20px;">
      <div style="width: 48px; height: 48px; background: rgba(213,235,75,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px; color: #D5EB4B;">!</span>
      </div>
      <div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff; margin-bottom: 4px;">Most businesses don't know this</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 15px; color: rgba(255,255,255,0.5);">3 employees doing work AI finishes in 10 minutes</div>
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <div style="position: absolute; bottom: 60px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.2);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Find Your Leak &rarr; Free Audit</span>
    </div>
  </div>

</div>
</body>
</html>
