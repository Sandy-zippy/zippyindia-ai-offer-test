<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: linear-gradient(180deg, #FFFDF7 0%, #F5F0E8 40%, #FFFDF7 100%); position: relative; overflow: hidden;">

  <!-- Hexagonal pattern (subtle) -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(42,42,53,0.03) 2px, transparent 2px); background-size: 50px 50px;"></div>

  <!-- Gradient mesh -->
  <div style="position: absolute; top: 200px; left: 50%; transform: translateX(-50%); width: 800px; height: 600px; background: radial-gradient(circle, rgba(213,235,75,0.06) 0%, transparent 70%);"></div>

  <!-- Decorative shapes -->
  <div style="position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border: 2px solid rgba(213,235,75,0.08); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: -40px; left: -40px; width: 160px; height: 160px; border: 2px solid rgba(42,42,53,0.04); transform: rotate(45deg);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; text-align: center; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #2A2A35;">
      We've automated<br>businesses <span style="color: #B8CF2E;">like yours.</span>
    </h1>
    <p style="font-family: 'Inter', sans-serif; font-size: 18px; color: rgba(42,42,53,0.5); margin-top: 16px;">In your industry. At your scale.</p>
  </div>

  <!-- Industry grid -->
  <div style="position: absolute; top: 400px; left: 80px; right: 80px; z-index: 5;">
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">
      <!-- Manufacturing -->
      <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">🏭</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">Manufacturing</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹38L saved</div>
      </div>
      <!-- Healthcare -->
      <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">🏥</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">Healthcare</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹25L saved</div>
      </div>
      <!-- Real Estate -->
      <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">🏠</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">Real Estate</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹42L saved</div>
      </div>
      <!-- D2C -->
      <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">🛍️</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">D2C / E-com</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹30L saved</div>
      </div>
      <!-- IT Services -->
      <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">💻</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">IT Services</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹35L saved</div>
      </div>
      <!-- Education -->
      <div style="background: rgba(213,235,75,0.08); border-radius: 20px; padding: 32px; border: 2px solid rgba(213,235,75,0.2); text-align: center;">
        <div style="font-size: 40px; margin-bottom: 12px;">🎓</div>
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #2A2A35;">Education</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #B8CF2E; margin-top: 8px;">₹20L saved</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 4px 15px rgba(213,235,75,0.3);">Find Your Industry Match →</div>
  </div>

</div>
</body>
</html>
