<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 25% 40%, rgba(229,62,62,0.08) 0%, transparent 40%), radial-gradient(circle at 75% 40%, rgba(213,235,75,0.1) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 48px 48px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline centered -->
  <div style="position: absolute; top: 130px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; color: #FFFFFF; line-height: 1.15;">
      Hiring more people<br>won't fix your business.
    </h1>
  </div>

  <!-- Two columns -->
  <div style="position: absolute; top: 290px; left: 50px; right: 50px; display: flex; gap: 30px; z-index: 10;">

    <!-- LEFT: More People -->
    <div style="flex: 1;">
      <div style="font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; color: #E53E3E; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-align: center;">More People</div>

      <!-- Stacking human icons -->
      <div style="background: rgba(229,62,62,0.06); border: 1px solid rgba(229,62,62,0.12); border-radius: 16px; padding: 24px; margin-bottom: 16px;">
        <div style="display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;">
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
          <div style="width: 40px; height: 40px; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: rgba(229,62,62,0.6); font-size: 18px;">&#9673;</span></div>
        </div>
        <div style="text-align: center; font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">8 employees, same output</div>
      </div>

      <!-- Growing cost bar chart -->
      <div style="background: rgba(229,62,62,0.06); border: 1px solid rgba(229,62,62,0.12); border-radius: 16px; padding: 20px;">
        <div style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Monthly Cost</div>
        <div style="display: flex; align-items: flex-end; gap: 8px; height: 120px;">
          <div style="flex: 1; height: 30%; background: rgba(229,62,62,0.2); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 45%; background: rgba(229,62,62,0.3); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 60%; background: rgba(229,62,62,0.4); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 75%; background: rgba(229,62,62,0.5); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 90%; background: rgba(229,62,62,0.7); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 100%; background: #E53E3E; border-radius: 4px 4px 0 0;"></div>
        </div>
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #E53E3E; margin-top: 12px; text-align: center;">₹8L/mo &uarr;</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 4px;">and climbing</div>
      </div>
    </div>

    <!-- RIGHT: Better Systems -->
    <div style="flex: 1;">
      <div style="font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; color: #D5EB4B; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; text-align: center;">Better Systems</div>

      <!-- Gear icon with orbiting elements -->
      <div style="background: rgba(213,235,75,0.06); border: 1px solid rgba(213,235,75,0.15); border-radius: 16px; padding: 24px; margin-bottom: 16px;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 16px;">
          <div style="width: 64px; height: 64px; background: rgba(213,235,75,0.15); border: 2px solid rgba(213,235,75,0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(213,235,75,0.15);">
            <span style="font-size: 30px; color: #D5EB4B;">&#9881;</span>
          </div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: #D5EB4B;">AI + 3 people</div>
        </div>
        <div style="display: flex; justify-content: center; gap: 8px;">
          <div style="width: 36px; height: 36px; background: rgba(213,235,75,0.12); border: 1px solid rgba(213,235,75,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: #D5EB4B; font-size: 16px;">&#9673;</span></div>
          <div style="width: 36px; height: 36px; background: rgba(213,235,75,0.12); border: 1px solid rgba(213,235,75,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: #D5EB4B; font-size: 16px;">&#9673;</span></div>
          <div style="width: 36px; height: 36px; background: rgba(213,235,75,0.12); border: 1px solid rgba(213,235,75,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span style="color: #D5EB4B; font-size: 16px;">&#9673;</span></div>
        </div>
        <div style="text-align: center; font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 12px;">10x the output</div>
      </div>

      <!-- Flat cost line -->
      <div style="background: rgba(213,235,75,0.06); border: 1px solid rgba(213,235,75,0.15); border-radius: 16px; padding: 20px;">
        <div style="font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Monthly Cost</div>
        <div style="display: flex; align-items: flex-end; gap: 8px; height: 120px; position: relative;">
          <!-- Flat line -->
          <div style="position: absolute; bottom: 30%; left: 0; right: 0; height: 3px; background: #D5EB4B; border-radius: 2px; box-shadow: 0 0 10px rgba(213,235,75,0.4);"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.15); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.15); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.15); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.15); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.15); border-radius: 4px 4px 0 0;"></div>
          <div style="flex: 1; height: 30%; background: rgba(213,235,75,0.2); border-radius: 4px 4px 0 0;"></div>
        </div>
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #D5EB4B; margin-top: 12px; text-align: center;">₹3L/mo &rarr;</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 4px;">stays flat forever</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 55px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.2);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Get Your Free Audit &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
