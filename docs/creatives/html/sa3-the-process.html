<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(ellipse at 50% 60%, rgba(213,235,75,0.08) 0%, transparent 60%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.04) 1px, transparent 1px); background-size: 44px 44px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 130px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; color: #FFFFFF; line-height: 1.15;">
      From Audit to Automation<br>in <span style="color: #D5EB4B;">14 Days</span>
    </h1>
  </div>

  <!-- Curved flowing path with 3 nodes -->
  <div style="position: absolute; top: 300px; left: 0; right: 0; height: 520px; z-index: 10;">

    <!-- Curved connecting line (using SVG) -->
    <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" viewBox="0 0 1080 520" fill="none">
      <!-- Curved path connecting the 3 nodes -->
      <path d="M 200 80 Q 400 80 540 260 Q 680 440 880 440" stroke="url(#pathGrad)" stroke-width="3" fill="none" stroke-dasharray="8 6"/>
      <defs>
        <linearGradient id="pathGrad" x1="200" y1="80" x2="880" y2="440">
          <stop offset="0%" stop-color="rgba(213,235,75,0.2)"/>
          <stop offset="50%" stop-color="rgba(213,235,75,0.4)"/>
          <stop offset="100%" stop-color="#D5EB4B"/>
        </linearGradient>
      </defs>
    </svg>

    <!-- Node 1: Take Quiz -->
    <div style="position: absolute; top: 20px; left: 100px;">
      <!-- Glassmorphism circle -->
      <div style="width: 120px; height: 120px; background: rgba(213,235,75,0.06); backdrop-filter: blur(10px); border: 2px solid rgba(213,235,75,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(213,235,75,0.08);">
        <div style="text-align: center;">
          <div style="font-size: 32px; margin-bottom: 2px;">&#9998;</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #D5EB4B;">1</div>
        </div>
      </div>
      <!-- Label -->
      <div style="text-align: center; margin-top: 16px; width: 120px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #fff;">Take Quiz</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(213,235,75,0.6); margin-top: 4px;">2 minutes</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.4;">Answer 8 questions about your ops</div>
      </div>
    </div>

    <!-- Node 2: Get Audit -->
    <div style="position: absolute; top: 190px; left: 440px;">
      <div style="width: 140px; height: 140px; background: rgba(213,235,75,0.08); backdrop-filter: blur(10px); border: 2px solid rgba(213,235,75,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(213,235,75,0.12);">
        <div style="text-align: center;">
          <div style="font-size: 36px; margin-bottom: 2px;">&#9776;</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #D5EB4B;">2</div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 16px; width: 140px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #fff;">Get Audit</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: rgba(213,235,75,0.6); margin-top: 4px;">48 hours</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.4;">Custom report with ROI projections</div>
      </div>
    </div>

    <!-- Node 3: Go Live -->
    <div style="position: absolute; top: 360px; right: 100px;">
      <div style="width: 160px; height: 160px; background: rgba(213,235,75,0.12); backdrop-filter: blur(10px); border: 2px solid rgba(213,235,75,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(213,235,75,0.15);">
        <div style="text-align: center;">
          <div style="font-size: 40px; margin-bottom: 2px;">&#9889;</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 36px; color: #D5EB4B;">3</div>
        </div>
      </div>
      <div style="text-align: center; margin-top: 16px; width: 160px;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #fff;">Go Live</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #D5EB4B; margin-top: 4px;">2 weeks</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.4;">10x output from day one</div>
      </div>
    </div>
  </div>

  <!-- Body text -->
  <div style="position: absolute; bottom: 130px; left: 60px; right: 60px; z-index: 10;">
    <p style="font-family: 'Inter', sans-serif; font-size: 20px; color: rgba(255,255,255,0.6); text-align: center;">
      We don't just consult. We build, deploy, and monitor.
    </p>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 55px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.2);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Start With the Quiz &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
