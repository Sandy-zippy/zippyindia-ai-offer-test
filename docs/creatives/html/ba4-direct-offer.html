<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 50% 50%, rgba(213,235,75,0.1) 0%, transparent 50%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.04) 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Decorative circles -->
  <div style="position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; border: 2px solid rgba(213,235,75,0.05); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: -60px; left: -60px; width: 200px; height: 200px; border: 2px solid rgba(213,235,75,0.04); border-radius: 50%;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 130px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; color: #FFFFFF; line-height: 1.2;">
      Free. Custom.<br><span style="color: #D5EB4B;">For your business specifically.</span>
    </h1>
  </div>

  <!-- 3D Isometric card stack -->
  <div style="position: absolute; top: 290px; left: 50%; transform: translateX(-50%); width: 600px; height: 480px; z-index: 10;">

    <!-- Card 3 (bottom) - ROI Projections -->
    <div style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) perspective(600px) rotateX(15deg) rotateZ(-2deg); width: 520px; z-index: 1;">
      <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 28px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div style="width: 52px; height: 52px; background: rgba(213,235,75,0.1); border: 1px solid rgba(213,235,75,0.2); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 24px; color: #D5EB4B;">&#8377;</span>
          </div>
          <div>
            <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #fff;">ROI Projections</div>
            <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">Exact savings in rupees with timeline</div>
          </div>
          <div style="margin-left: auto; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: #D5EB4B;">₹40L+</div>
        </div>
      </div>
    </div>

    <!-- Card 2 (middle) - Automation Roadmap -->
    <div style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%) perspective(600px) rotateX(15deg) rotateZ(1deg); width: 540px; z-index: 2;">
      <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 28px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div style="width: 52px; height: 52px; background: rgba(213,235,75,0.12); border: 1px solid rgba(213,235,75,0.25); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 24px; color: #D5EB4B;">&#9776;</span>
          </div>
          <div>
            <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #fff;">Automation Roadmap</div>
            <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">Step-by-step implementation plan</div>
          </div>
          <div style="margin-left: auto;">
            <div style="display: flex; gap: 4px;">
              <div style="width: 20px; height: 6px; background: #D5EB4B; border-radius: 3px;"></div>
              <div style="width: 20px; height: 6px; background: rgba(213,235,75,0.5); border-radius: 3px;"></div>
              <div style="width: 20px; height: 6px; background: rgba(213,235,75,0.3); border-radius: 3px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 1 (top) - Operations Audit -->
    <div style="position: absolute; bottom: 240px; left: 50%; transform: translateX(-50%) perspective(600px) rotateX(15deg) rotateZ(-1deg); width: 560px; z-index: 3;">
      <div style="background: rgba(213,235,75,0.06); backdrop-filter: blur(12px); border: 2px solid rgba(213,235,75,0.2); border-radius: 18px; padding: 28px 32px; box-shadow: 0 25px 70px rgba(0,0,0,0.5), 0 0 30px rgba(213,235,75,0.06);">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div style="width: 52px; height: 52px; background: rgba(213,235,75,0.15); border: 1px solid rgba(213,235,75,0.3); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 24px; color: #D5EB4B;">&#9745;</span>
          </div>
          <div>
            <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #D5EB4B;">Operations Audit</div>
            <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5);">Full workflow analysis and bottleneck map</div>
          </div>
          <div style="margin-left: auto; background: rgba(213,235,75,0.15); border-radius: 8px; padding: 6px 12px;">
            <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: #D5EB4B;">FREE</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom info -->
  <div style="position: absolute; bottom: 130px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: rgba(255,255,255,0.5);">
      2-minute quiz &middot; 48-hour delivery &middot; Zero payment
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 50px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 22px 52px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.25);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; color: #2A2A35;">Get Started &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
