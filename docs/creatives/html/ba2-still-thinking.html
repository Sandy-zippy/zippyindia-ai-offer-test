<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; position: relative; overflow: hidden;">

  <!-- Top half: Dark with red tint (wasting time) -->
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 55%; background: radial-gradient(circle at 50% 60%, rgba(229,62,62,0.08) 0%, transparent 50%), #2A2A35;"></div>
  <!-- Bottom half: Dark with lime (the fix) -->
  <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 45%; background: radial-gradient(circle at 50% 30%, rgba(213,235,75,0.1) 0%, transparent 50%), #2A2A35;"></div>

  <!-- Grid -->
  <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <!-- Diagonal split line -->
  <div style="position: absolute; top: 55%; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 130px; left: 60px; right: 60px; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; color: #FFFFFF; line-height: 1.2;">
      Still thinking about it?<br><span style="color: #D5EB4B;">Your competitors aren't.</span>
    </h1>
  </div>

  <!-- Ticking clock visualization -->
  <div style="position: absolute; top: 300px; left: 60px; right: 60px; z-index: 10; display: flex; align-items: center; gap: 30px;">
    <!-- Clock face -->
    <div style="width: 160px; height: 160px; border: 4px solid rgba(229,62,62,0.3); border-radius: 50%; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
      <!-- Clock marks -->
      <div style="position: absolute; top: 8px; left: 50%; width: 2px; height: 14px; background: rgba(255,255,255,0.2); transform: translateX(-50%);"></div>
      <div style="position: absolute; bottom: 8px; left: 50%; width: 2px; height: 14px; background: rgba(255,255,255,0.2); transform: translateX(-50%);"></div>
      <div style="position: absolute; left: 8px; top: 50%; width: 14px; height: 2px; background: rgba(255,255,255,0.2); transform: translateY(-50%);"></div>
      <div style="position: absolute; right: 8px; top: 50%; width: 14px; height: 2px; background: rgba(255,255,255,0.2); transform: translateY(-50%);"></div>
      <!-- Clock hands -->
      <div style="position: absolute; width: 3px; height: 50px; background: #E53E3E; border-radius: 2px; bottom: 50%; left: 50%; transform-origin: bottom center; transform: translateX(-50%) rotate(30deg);"></div>
      <div style="position: absolute; width: 2px; height: 60px; background: rgba(255,255,255,0.4); border-radius: 2px; bottom: 50%; left: 50%; transform-origin: bottom center; transform: translateX(-50%) rotate(150deg);"></div>
      <!-- Center dot -->
      <div style="width: 10px; height: 10px; background: #E53E3E; border-radius: 50%;"></div>
    </div>

    <!-- Time wasted counter -->
    <div>
      <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Time wasted this week</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 64px; color: #E53E3E; line-height: 1;">₹75K</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 18px; color: rgba(229,62,62,0.6); margin-top: 4px;">lost to manual busywork</div>
      <div style="margin-top: 12px; display: flex; gap: 12px;">
        <div style="background: rgba(229,62,62,0.1); border-radius: 8px; padding: 8px 14px;">
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #E53E3E;">₹3L/month</span>
        </div>
        <div style="background: rgba(229,62,62,0.1); border-radius: 8px; padding: 8px 14px;">
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #E53E3E;">₹36L/year</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Fix it card (lime section) -->
  <div style="position: absolute; bottom: 120px; left: 60px; right: 60px; z-index: 10;">
    <div style="background: rgba(213,235,75,0.08); backdrop-filter: blur(10px); border: 2px solid rgba(213,235,75,0.25); border-radius: 20px; padding: 36px 40px; box-shadow: 0 0 40px rgba(213,235,75,0.08);">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <div>
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 32px; color: #D5EB4B; margin-bottom: 6px;">Fix it in 2 minutes.</div>
          <div style="font-family: 'Inter', sans-serif; font-size: 18px; color: rgba(255,255,255,0.5);">The audit is free. The roadmap is custom.</div>
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #fff; margin-top: 8px;">What's stopping you?</div>
        </div>
        <div style="display: inline-block; background: #D5EB4B; padding: 22px 44px; border-radius: 12px; flex-shrink: 0; box-shadow: 0 0 30px rgba(213,235,75,0.3);">
          <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Finish the Quiz &rarr;</span>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
