<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: linear-gradient(135deg, #FFFDF7 0%, #F5F0E8 50%, #FFFDF7 100%); position: relative; overflow: hidden;">

  <!-- Geometric clock circles -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 800px; height: 800px; border: 1px solid rgba(42,42,53,0.05); border-radius: 50%;"></div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 650px; height: 650px; border: 1px solid rgba(42,42,53,0.08); border-radius: 50%;"></div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 500px; border: 1px solid rgba(42,42,53,0.04); border-radius: 50%;"></div>

  <!-- Clock tick marks -->
  <div style="position: absolute; top: 140px; left: 538px; width: 4px; height: 30px; background: rgba(42,42,53,0.15); border-radius: 2px;"></div>
  <div style="position: absolute; top: 538px; right: 140px; width: 30px; height: 4px; background: rgba(42,42,53,0.15); border-radius: 2px;"></div>
  <div style="position: absolute; bottom: 140px; left: 538px; width: 4px; height: 30px; background: rgba(42,42,53,0.15); border-radius: 2px;"></div>
  <div style="position: absolute; top: 538px; left: 140px; width: 30px; height: 4px; background: rgba(42,42,53,0.15); border-radius: 2px;"></div>

  <!-- Clock hand (lime accent) -->
  <div style="position: absolute; top: 50%; left: 50%; width: 4px; height: 220px; background: linear-gradient(180deg, #D5EB4B, #B8CF2E); border-radius: 2px; transform-origin: top center; transform: rotate(30deg); opacity: 0.6;"></div>
  <div style="position: absolute; top: 50%; left: 50%; width: 3px; height: 160px; background: rgba(42,42,53,0.3); border-radius: 2px; transform-origin: top center; transform: rotate(-60deg);"></div>
  <!-- Center dot -->
  <div style="position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; background: #D5EB4B; border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 20px rgba(213,235,75,0.4);"></div>

  <!-- Diagonal accent stripe -->
  <div style="position: absolute; top: -200px; right: 200px; width: 600px; height: 60px; background: rgba(213,235,75,0.06); transform: rotate(-45deg);"></div>
  <div style="position: absolute; bottom: -200px; left: 200px; width: 600px; height: 40px; background: rgba(213,235,75,0.04); transform: rotate(-45deg);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto;">

  <!-- Main headline -->
  <div style="position: absolute; top: 170px; left: 60px; right: 60px; text-align: center;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; line-height: 1.15; color: #2A2A35;">
      Your team spends<br><span style="color: #B8CF2E;">40 hours/week</span> on work<br>AI does in <span style="color: #B8CF2E;">40 minutes.</span>
    </h1>
  </div>

  <!-- Time comparison boxes -->
  <div style="position: absolute; bottom: 200px; left: 60px; right: 60px; display: flex; gap: 30px; justify-content: center;">
    <div style="background: rgba(42,42,53,0.05); border: 1px solid rgba(42,42,53,0.1); border-radius: 16px; padding: 30px 40px; text-align: center;">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 48px; color: #E53E3E;">40hrs</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(42,42,53,0.5); text-transform: uppercase; letter-spacing: 2px; margin-top: 8px;">Manual Work</div>
    </div>
    <div style="display: flex; align-items: center;">
      <div style="font-family: 'Space Grotesk', sans-serif; font-size: 32px; color: rgba(42,42,53,0.2);">→</div>
    </div>
    <div style="background: rgba(213,235,75,0.15); border: 1px solid rgba(213,235,75,0.3); border-radius: 16px; padding: 30px 40px; text-align: center;">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 48px; color: #B8CF2E;">40min</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(42,42,53,0.5); text-transform: uppercase; letter-spacing: 2px; margin-top: 8px;">With AI Ops</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px;">Take the 2-Min Quiz →</div>
  </div>

</div>
</body>
</html>
