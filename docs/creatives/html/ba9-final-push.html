<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 50% 60%, rgba(213,235,75,0.12) 0%, transparent 50%), radial-gradient(circle at 20% 20%, rgba(213,235,75,0.05) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Glow gradient from bottom -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 400px; background: linear-gradient(180deg, transparent, rgba(213,235,75,0.04));"></div>

  <!-- Dot pattern -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.05) 1px, transparent 1px); background-size: 45px 45px;"></div>

  <!-- Concentric circles around progress -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 800px; height: 800px; border: 1px solid rgba(213,235,75,0.03); border-radius: 50%;"></div>
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; border: 1px solid rgba(213,235,75,0.05); border-radius: 50%;"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 180px; left: 60px; right: 60px; text-align: center; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 48px; line-height: 1.15; color: #FFFFFF;">
      You're <span style="color: #D5EB4B;">2 minutes</span> away<br>from finding ₹40L<br>in savings.
    </h1>
  </div>

  <!-- Large circular progress -->
  <div style="position: absolute; top: 430px; left: 50%; transform: translateX(-50%); z-index: 5;">
    <div style="width: 300px; height: 300px; position: relative;">
      <!-- Background circle -->
      <svg width="300" height="300" viewBox="0 0 300 300" style="transform: rotate(-90deg);">
        <circle cx="150" cy="150" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
        <circle cx="150" cy="150" r="130" fill="none" stroke="#D5EB4B" stroke-width="12" stroke-dasharray="735.1" stroke-dashoffset="73.5" stroke-linecap="round"/>
      </svg>
      <!-- Center text -->
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 64px; color: #D5EB4B; line-height: 1;">90%</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.4); margin-top: 8px;">Almost there</div>
      </div>
    </div>
  </div>

  <!-- Steps completed -->
  <div style="position: absolute; bottom: 220px; left: 120px; right: 120px; z-index: 5;">
    <div style="display: flex; gap: 16px; align-items: center;">
      <div style="flex: 1; display: flex; align-items: center; gap: 12px;">
        <div style="width: 28px; height: 28px; background: #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 14px; color: #1A1A2E;">✓</span>
        </div>
        <span style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5);">You found us</span>
      </div>
      <div style="flex: 1; display: flex; align-items: center; gap: 12px;">
        <div style="width: 28px; height: 28px; background: #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 14px; color: #1A1A2E;">✓</span>
        </div>
        <span style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.5);">You came back</span>
      </div>
      <div style="flex: 1; display: flex; align-items: center; gap: 12px;">
        <div style="width: 28px; height: 28px; background: rgba(255,255,255,0.1); border: 2px solid #D5EB4B; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 14px; color: #D5EB4B;">?</span>
        </div>
        <span style="font-family: 'Inter', sans-serif; font-size: 14px; color: #D5EB4B;">Take the quiz</span>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; padding: 20px 48px; border-radius: 8px; box-shadow: 0 0 30px rgba(213,235,75,0.4);">Complete the Last Step →</div>
  </div>

</div>
</body>
</html>
