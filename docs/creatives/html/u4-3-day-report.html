<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(ellipse at 50% 40%, rgba(213,235,75,0.08) 0%, transparent 60%), radial-gradient(circle at 80% 80%, rgba(229,62,62,0.06) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 36px 36px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Pre-headline -->
  <div style="position: absolute; top: 145px; left: 60px; z-index: 10;">
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 3px;">Report Status</div>
  </div>

  <!-- Headline -->
  <div style="position: absolute; top: 175px; left: 60px; right: 60px; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.15; color: #FFFFFF;">
      By the time you see last<br>week's numbers, the<br>opportunity is <span style="color: #E53E3E;">gone.</span>
    </h1>
  </div>

  <!-- Fake Dashboard Mockup -->
  <div style="position: absolute; top: 400px; left: 80px; right: 80px; z-index: 10;">
    <!-- Browser chrome -->
    <div style="background: rgba(255,255,255,0.08); border-radius: 16px 16px 0 0; padding: 14px 20px; display: flex; align-items: center; gap: 8px;">
      <div style="width: 12px; height: 12px; background: rgba(229,62,62,0.6); border-radius: 50%;"></div>
      <div style="width: 12px; height: 12px; background: rgba(255,200,50,0.5); border-radius: 50%;"></div>
      <div style="width: 12px; height: 12px; background: rgba(100,200,100,0.4); border-radius: 50%;"></div>
      <div style="flex: 1; margin-left: 12px; background: rgba(255,255,255,0.06); border-radius: 6px; padding: 6px 14px;">
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.3);">reports.company.com/weekly</span>
      </div>
    </div>
    <!-- Dashboard body -->
    <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-top: none; border-radius: 0 0 16px 16px; padding: 30px; position: relative;">
      <!-- Loading spinner overlay -->
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(42,42,53,0.7); border-radius: 0 0 16px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5;">
        <!-- Spinner ring -->
        <div style="width: 64px; height: 64px; border: 4px solid rgba(229,62,62,0.15); border-top: 4px solid #E53E3E; border-radius: 50%; margin-bottom: 20px;"></div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin-bottom: 8px;">Compiling report...</div>
        <div style="background: rgba(229,62,62,0.15); border: 1px solid rgba(229,62,62,0.3); border-radius: 8px; padding: 8px 16px; margin-top: 4px;">
          <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; color: #E53E3E;">Last updated: 3 days ago</span>
        </div>
      </div>
      <!-- Blurred dashboard elements behind -->
      <div style="display: flex; gap: 16px; margin-bottom: 16px; filter: blur(2px);">
        <div style="flex: 1; height: 60px; background: rgba(255,255,255,0.03); border-radius: 8px;"></div>
        <div style="flex: 1; height: 60px; background: rgba(255,255,255,0.03); border-radius: 8px;"></div>
        <div style="flex: 1; height: 60px; background: rgba(255,255,255,0.03); border-radius: 8px;"></div>
      </div>
      <div style="height: 100px; background: rgba(255,255,255,0.02); border-radius: 8px; filter: blur(2px);"></div>
    </div>
  </div>

  <!-- VS: Real-time badge -->
  <div style="position: absolute; top: 780px; left: 80px; right: 80px; z-index: 10;">
    <div style="display: flex; align-items: center; gap: 20px;">
      <div style="background: rgba(213,235,75,0.1); border: 2px solid rgba(213,235,75,0.3); border-radius: 12px; padding: 14px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 0 25px rgba(213,235,75,0.1);">
        <div style="width: 12px; height: 12px; background: #D5EB4B; border-radius: 50%; box-shadow: 0 0 8px rgba(213,235,75,0.6);"></div>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: #D5EB4B;">REAL-TIME</span>
      </div>
      <div style="font-family: 'Inter', sans-serif; font-size: 18px; color: rgba(255,255,255,0.5);">AI generates it in <span style="color: #D5EB4B; font-weight: 600;">30 seconds</span></div>
    </div>
  </div>

  <!-- Stat callout -->
  <div style="position: absolute; top: 850px; left: 80px; z-index: 10;">
    <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B; line-height: 1;">3-5 days</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.4); margin-top: 4px;">wasted every single week</div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 55px; right: 80px; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.2);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Get Real-Time Data &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
