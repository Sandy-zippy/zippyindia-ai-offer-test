<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 30% 30%, rgba(213,235,75,0.12) 0%, transparent 50%), radial-gradient(circle at 70% 70%, rgba(213,235,75,0.08) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.05) 1px, transparent 1px); background-size: 45px 45px;"></div>

  <!-- Glow spots -->
  <div style="position: absolute; top: 300px; left: 100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(213,235,75,0.08) 0%, transparent 70%);"></div>
  <div style="position: absolute; bottom: 200px; right: 100px; width: 250px; height: 250px; background: radial-gradient(circle, rgba(213,235,75,0.06) 0%, transparent 70%);"></div>

  <!-- Accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.15; color: #FFFFFF;">
      The numbers<br>speak for <span style="color: #D5EB4B;">themselves.</span>
    </h1>
  </div>

  <!-- Floating glassmorphism stat cards -->
  <div style="position: absolute; top: 340px; left: 60px; right: 60px; z-index: 5;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <!-- Card 1 -->
      <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; transform: rotate(-1deg);">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B; line-height: 1;">₹1.6Cr</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 12px;">saved for clients in 2025</div>
        <div style="width: 40px; height: 4px; background: #D5EB4B; border-radius: 2px; margin-top: 16px; opacity: 0.5;"></div>
      </div>
      <!-- Card 2 -->
      <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; transform: rotate(1.5deg);">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B; line-height: 1;">8000+</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 12px;">hours of busywork eliminated</div>
        <div style="width: 40px; height: 4px; background: #D5EB4B; border-radius: 2px; margin-top: 16px; opacity: 0.5;"></div>
      </div>
      <!-- Card 3 -->
      <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; transform: rotate(0.5deg);">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B; line-height: 1;">20+</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 12px;">Indian businesses automated</div>
        <div style="width: 40px; height: 4px; background: #D5EB4B; border-radius: 2px; margin-top: 16px; opacity: 0.5;"></div>
      </div>
      <!-- Card 4 -->
      <div style="background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 36px; transform: rotate(-0.5deg);">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B; line-height: 1;">10x</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 12px;">output with the same team</div>
        <div style="width: 40px; height: 4px; background: #D5EB4B; border-radius: 2px; margin-top: 16px; opacity: 0.5;"></div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; display: flex; align-items: center; gap: 24px; z-index: 10;">
    <div style="background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 0 25px rgba(213,235,75,0.3);">See What We Can Save You →</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">Free Audit. 48hrs.</div>
  </div>

</div>
</body>
</html>
