<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: linear-gradient(135deg, #FFFDF7 0%, #F5F0E8 50%, #FFFDF7 100%); position: relative; overflow: hidden;">

  <!-- Subtle grid -->
  <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(42,42,53,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(42,42,53,0.03) 1px, transparent 1px); background-size: 80px 80px;"></div>

  <!-- Gradient spots -->
  <div style="position: absolute; top: 100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(213,235,75,0.06) 0%, transparent 70%);"></div>
  <div style="position: absolute; bottom: -50px; left: -50px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(229,62,62,0.04) 0%, transparent 70%);"></div>

  <!-- Decorative shapes -->
  <div style="position: absolute; top: -60px; left: -60px; width: 200px; height: 200px; border: 2px solid rgba(42,42,53,0.04); border-radius: 50%;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.15; color: #2A2A35;">
      While you're thinking,<br>others are <span style="color: #B8CF2E;">moving.</span>
    </h1>
  </div>

  <!-- Kanban Board -->
  <div style="position: absolute; top: 360px; left: 60px; right: 60px; z-index: 5;">
    <div style="display: flex; gap: 20px;">
      <!-- Column 1: Applied -->
      <div style="flex: 1;">
        <div style="background: rgba(213,235,75,0.1); border-radius: 12px 12px 0 0; padding: 16px 20px; text-align: center; border: 1px solid rgba(213,235,75,0.2); border-bottom: none;">
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #2A2A35;">Applied</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #B8CF2E;">7</div>
        </div>
        <div style="background: white; border-radius: 0 0 12px 12px; padding: 12px; border: 1px solid rgba(42,42,53,0.06); border-top: none; display: flex; flex-direction: column; gap: 8px;">
          <div style="background: #F5F0E8; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.6);">Manufacturing Co.</div>
          <div style="background: #F5F0E8; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.6);">HealthTech Pvt.</div>
          <div style="background: #F5F0E8; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.6);">Real Estate Group</div>
          <div style="background: #F5F0E8; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.4);">+4 more...</div>
        </div>
      </div>

      <!-- Arrow -->
      <div style="display: flex; align-items: center; flex-shrink: 0; padding-top: 60px;">
        <span style="font-family: 'Space Grotesk', sans-serif; font-size: 28px; color: rgba(42,42,53,0.15);">→</span>
      </div>

      <!-- Column 2: Auditing -->
      <div style="flex: 1;">
        <div style="background: rgba(255,165,0,0.08); border-radius: 12px 12px 0 0; padding: 16px 20px; text-align: center; border: 1px solid rgba(255,165,0,0.15); border-bottom: none;">
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #2A2A35;">Auditing</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #E5953E;">2</div>
        </div>
        <div style="background: white; border-radius: 0 0 12px 12px; padding: 12px; border: 1px solid rgba(42,42,53,0.06); border-top: none; display: flex; flex-direction: column; gap: 8px;">
          <div style="background: rgba(255,165,0,0.06); border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.6); border-left: 3px solid #E5953E;">D2C Brand</div>
          <div style="background: rgba(255,165,0,0.06); border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(42,42,53,0.6); border-left: 3px solid #E5953E;">IT Services Co.</div>
        </div>
      </div>

      <!-- Arrow -->
      <div style="display: flex; align-items: center; flex-shrink: 0; padding-top: 60px;">
        <span style="font-family: 'Space Grotesk', sans-serif; font-size: 28px; color: rgba(42,42,53,0.15);">→</span>
      </div>

      <!-- Column 3: Spots Left -->
      <div style="flex: 1;">
        <div style="background: rgba(229,62,62,0.08); border-radius: 12px 12px 0 0; padding: 16px 20px; text-align: center; border: 1px solid rgba(229,62,62,0.15); border-bottom: none;">
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #2A2A35;">Spots Left</div>
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 32px; color: #E53E3E;">1</div>
        </div>
        <div style="background: white; border-radius: 0 0 12px 12px; padding: 12px; border: 1px solid rgba(42,42,53,0.06); border-top: none; min-height: 120px; display: flex; align-items: center; justify-content: center;">
          <div style="border: 2px dashed rgba(229,62,62,0.2); border-radius: 8px; padding: 20px; text-align: center; width: 100%;">
            <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(42,42,53,0.4);">Your business?</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Urgency text -->
  <div style="position: absolute; bottom: 170px; left: 60px; right: 60px; text-align: center; z-index: 5;">
    <p style="font-family: 'Inter', sans-serif; font-size: 18px; color: rgba(42,42,53,0.5);">This quarter's capacity is almost full. Next opening: Q3 2026.</p>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 4px 15px rgba(213,235,75,0.3);">Grab the Last Spot →</div>
  </div>

</div>
</body>
</html>
