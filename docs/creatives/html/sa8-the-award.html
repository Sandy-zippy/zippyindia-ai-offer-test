<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #FFFDF7; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: linear-gradient(180deg, #FFFDF7 0%, #F8F4EC 50%, #FFFDF7 100%); position: relative; overflow: hidden;">

  <!-- Radial glow -->
  <div style="position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(213,235,75,0.1) 0%, transparent 70%);"></div>

  <!-- Subtle pattern -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(42,42,53,0.03) 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Decorative lines -->
  <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 120px; background: linear-gradient(180deg, rgba(213,235,75,0.3), transparent);"></div>

  <!-- Geometric circles -->
  <div style="position: absolute; top: -100px; left: -100px; width: 300px; height: 300px; border: 1px solid rgba(42,42,53,0.04); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: -80px; right: -80px; width: 250px; height: 250px; border: 1px solid rgba(42,42,53,0.04); border-radius: 50%;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-transparent.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Award Badge -->
  <div style="position: absolute; top: 200px; left: 50%; transform: translateX(-50%); z-index: 5;">
    <!-- Outer ring -->
    <div style="width: 280px; height: 280px; border-radius: 50%; background: linear-gradient(135deg, #D5EB4B, #B8CF2E); padding: 6px; position: relative;">
      <!-- Inner ring -->
      <div style="width: 100%; height: 100%; border-radius: 50%; background: #FFFDF7; display: flex; align-items: center; justify-content: center; padding: 6px;">
        <!-- Medal center -->
        <div style="width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, rgba(213,235,75,0.1), rgba(213,235,75,0.05)); border: 2px solid rgba(213,235,75,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
          <div style="font-size: 40px; margin-bottom: 8px;">🏆</div>
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: #2A2A35; text-transform: uppercase; letter-spacing: 2px;">Fastest Growing</div>
          <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #B8CF2E; margin-top: 4px;">AI Marketing Agency</div>
        </div>
      </div>
      <!-- Ribbon elements -->
      <div style="position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 40px solid #D5EB4B; border-right: 40px solid #B8CF2E; border-bottom: 25px solid transparent;"></div>
    </div>

    <!-- Stars -->
    <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px;">
      <div style="font-size: 20px; color: #D5EB4B;">★</div>
      <div style="font-size: 24px; color: #D5EB4B;">★</div>
      <div style="font-size: 28px; color: #D5EB4B;">★</div>
      <div style="font-size: 24px; color: #D5EB4B;">★</div>
      <div style="font-size: 20px; color: #D5EB4B;">★</div>
    </div>
  </div>

  <!-- Award text -->
  <div style="position: absolute; top: 530px; left: 60px; right: 60px; text-align: center; z-index: 5;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 42px; line-height: 1.2; color: #2A2A35;">
      Fastest Growing<br>AI Marketing Agency
    </h1>
    <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: #B8CF2E; margin-top: 12px;">India 2026</div>
  </div>

  <!-- Trust stats -->
  <div style="position: absolute; top: 720px; left: 100px; right: 100px; display: flex; gap: 20px; z-index: 5;">
    <div style="flex: 1; text-align: center; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06);">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #B8CF2E;">20+</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-top: 4px;">Clients Served</div>
    </div>
    <div style="flex: 1; text-align: center; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06);">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #B8CF2E;">₹1.6Cr</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-top: 4px;">Client Savings</div>
    </div>
    <div style="flex: 1; text-align: center; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(42,42,53,0.06);">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; color: #B8CF2E;">10x</div>
      <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(42,42,53,0.5); margin-top: 4px;">Avg. ROI</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px; box-shadow: 0 4px 15px rgba(213,235,75,0.3);">Get Your Free Audit →</div>
  </div>

</div>
</body>
</html>
