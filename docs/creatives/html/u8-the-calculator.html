<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(ellipse at 30% 20%, rgba(213,235,75,0.1) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(213,235,75,0.06) 0%, transparent 50%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid pattern -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(213,235,75,0.06) 1px, transparent 1px); background-size: 50px 50px;"></div>

  <!-- Geometric shapes -->
  <div style="position: absolute; top: -120px; right: -80px; width: 350px; height: 350px; border: 1.5px solid rgba(213,235,75,0.06); border-radius: 50%;"></div>
  <div style="position: absolute; bottom: -100px; left: -60px; width: 280px; height: 280px; border: 1.5px solid rgba(213,235,75,0.04); transform: rotate(45deg);"></div>

  <!-- Lime accent bar -->
  <div style="position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #D5EB4B 0%, rgba(213,235,75,0.1) 100%);"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 5;">

  <!-- Headline -->
  <div style="position: absolute; top: 160px; left: 60px; right: 60px; z-index: 5;">
    <div style="font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px;">The Math No One Does</div>
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.15; color: #FFFFFF;">
      Your <span style="color: #D5EB4B;">real</span> salary bill<br>has a hidden line item.
    </h1>
  </div>

  <!-- Glassmorphism Calculator -->
  <div style="position: absolute; top: 380px; left: 100px; right: 100px; background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; z-index: 5;">

    <!-- Calculator display -->
    <div style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 24px 30px; margin-bottom: 30px;">
      <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px; color: rgba(255,255,255,0.5); margin-bottom: 12px;">
        ₹15L <span style="color: rgba(255,255,255,0.3)">salary</span> × 3 <span style="color: rgba(255,255,255,0.3)">employees</span> × 50% <span style="color: rgba(255,255,255,0.3)">manual</span>
      </div>
      <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 16px 0;"></div>
      <div style="display: flex; align-items: baseline; gap: 16px;">
        <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 56px; color: #D5EB4B;">= ₹22.5L</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.4);">/year wasted</div>
      </div>
    </div>

    <!-- Calculator rows -->
    <div style="display: flex; flex-direction: column; gap: 16px;">
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.6);">Average salary per employee</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: #fff;">₹15,00,000</span>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.6);">Employees on manual tasks</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: #fff;">3</span>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0;">
        <span style="font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.6);">Time spent on busywork</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 18px; color: #E53E3E;">50%</span>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; display: flex; align-items: center; gap: 24px; z-index: 5;">
    <div style="background: #D5EB4B; color: #1A1A2E; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; padding: 16px 36px; border-radius: 8px;">Calculate Your Waste →</div>
    <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: rgba(255,255,255,0.4);">2-minute quiz. Free audit.</div>
  </div>

</div>
</body>
</html>
