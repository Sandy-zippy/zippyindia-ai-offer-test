<!DOCTYPE html>
<html>
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

<body style="margin:0;padding:0;background: #2A2A35;">
<div style="width:1080px;height:1080px;background:#2A2A35;position:relative;overflow:hidden;font-family:'Inter',sans-serif;">

  <!-- Stats row -->
  <div style="position:absolute;top:530px;left:70px;right:70px;display:flex;gap:20px;z-index:10;">

      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:36px;color:#D5EB4B;">₹1.6Cr+</div>

    </div>
    <div style="flex:1;background:#33333F;border-radius:12px;padding:24px 20px;text-align:center;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:36px;color:#D5EB4B;">8000+</div>
      <div style="font-size:15px;color:rgba(255,255,255,0.5);margin-top:8px;">hours freed</div>
    </div>
    <div style="flex:1;background:#33333F;border-radius:12px;padding:24px 20px;text-align:center;">
      <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:36px;color:#D5EB4B;">20+</div>
      <div style="font-size:15px;color:rgba(255,255,255,0.5);margin-top:8px;">businesses automated</div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position:absolute;top:770px;left:70px;z-index:10;">
    <div style="display:inline-block;background:#D5EB4B;border-radius:12px;padding:20px 48px;">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#2A2A35;">See What We Can Do For You →</span>
