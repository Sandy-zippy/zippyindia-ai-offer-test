<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="background: #2A2A35; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
<div style="width: 1080px; height: 1080px; background: radial-gradient(circle at 30% 20%, rgba(229,62,62,0.06) 0%, transparent 40%), radial-gradient(circle at 70% 20%, rgba(213,235,75,0.08) 0%, transparent 40%), #2A2A35; position: relative; overflow: hidden;">

  <!-- Dot grid -->
  <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Logo -->
  <img src="../../../brand-assets/zippyscale-logo-for-dark-bg.png" style="position: absolute; top: 50px; left: 60px; width: 120px; height: auto; z-index: 10;">

  <!-- Headline -->
  <div style="position: absolute; top: 130px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <h1 style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 44px; color: #FFFFFF; line-height: 1.15;">
      Your competitor automated<br>last quarter. <span style="color: #D5EB4B;">You didn't.</span>
    </h1>
  </div>

  <!-- Scoreboard -->
  <div style="position: absolute; top: 290px; left: 60px; right: 60px; z-index: 10;">
    <!-- Scoreboard header -->
    <div style="display: flex; margin-bottom: 4px; padding: 0 20px;">
      <div style="flex: 2;"></div>
      <div style="flex: 1; text-align: center;">
        <div style="font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; color: #E53E3E; text-transform: uppercase; letter-spacing: 2px;">Your Business</div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; color: #D5EB4B; text-transform: uppercase; letter-spacing: 2px;">Competitor</div>
      </div>
    </div>

    <!-- Row 1: Speed to Lead -->
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 20px; margin-bottom: 10px; display: flex; align-items: center;">
      <div style="flex: 2;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff;">Speed to Lead</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 2px;">First response time</div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.25); border-radius: 10px; padding: 10px 20px;">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #E53E3E;">48 hrs</div>
        </div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(213,235,75,0.1); border: 1px solid rgba(213,235,75,0.25); border-radius: 10px; padding: 10px 20px; box-shadow: 0 0 15px rgba(213,235,75,0.1);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #D5EB4B;">2 min</div>
        </div>
      </div>
    </div>

    <!-- Row 2: Follow-up Rate -->
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 20px; margin-bottom: 10px; display: flex; align-items: center;">
      <div style="flex: 2;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff;">Follow-up Rate</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 2px;">Leads followed up</div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.25); border-radius: 10px; padding: 10px 20px;">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #E53E3E;">34%</div>
        </div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(213,235,75,0.1); border: 1px solid rgba(213,235,75,0.25); border-radius: 10px; padding: 10px 20px; box-shadow: 0 0 15px rgba(213,235,75,0.1);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #D5EB4B;">100%</div>
        </div>
      </div>
    </div>

    <!-- Row 3: Report Time -->
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 20px; margin-bottom: 10px; display: flex; align-items: center;">
      <div style="flex: 2;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff;">Report Time</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 2px;">Weekly data compile</div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.25); border-radius: 10px; padding: 10px 20px;">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #E53E3E;">3 days</div>
        </div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(213,235,75,0.1); border: 1px solid rgba(213,235,75,0.25); border-radius: 10px; padding: 10px 20px; box-shadow: 0 0 15px rgba(213,235,75,0.1);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #D5EB4B;">Real-time</div>
        </div>
      </div>
    </div>

    <!-- Row 4: Revenue Impact -->
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 20px; display: flex; align-items: center;">
      <div style="flex: 2;">
        <div style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #fff;">Revenue Impact</div>
        <div style="font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 2px;">Annual loss from inefficiency</div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(229,62,62,0.12); border: 1px solid rgba(229,62,62,0.25); border-radius: 10px; padding: 10px 20px;">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #E53E3E;">-23%</div>
        </div>
      </div>
      <div style="flex: 1; text-align: center;">
        <div style="display: inline-block; background: rgba(213,235,75,0.1); border: 1px solid rgba(213,235,75,0.25); border-radius: 10px; padding: 10px 20px; box-shadow: 0 0 15px rgba(213,235,75,0.1);">
          <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 24px; color: #D5EB4B;">+40L saved</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div style="position: absolute; bottom: 55px; left: 60px; right: 60px; text-align: center; z-index: 10;">
    <div style="display: inline-block; background: #D5EB4B; padding: 20px 48px; border-radius: 12px; box-shadow: 0 0 30px rgba(213,235,75,0.2);">
      <span style="font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #2A2A35;">Close the Gap &rarr;</span>
    </div>
  </div>

</div>
</body>
</html>
